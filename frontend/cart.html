<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodStack | Cart</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body class="paper-bg">
  <main class="app-shell">
    <section class="app-surface">
      <header class="app-header app-header--topbar" data-topbar data-topbar-mode="user" data-topbar-context="cart"></header>

      <section class="cart-layout">
        <article class="cart-list" aria-label="Cart products">
          <h1 class="section-title">Your Cart</h1>
          <p class="section-subtitle">Review your items and adjust quantity before checkout.</p>

          <div id="cart-items" class="cart-items"></div>
        </article>

        <aside class="cart-summary" aria-label="Order summary">
          <h2 class="section-title">Summary</h2>
          <div class="summary-row">
            <span>Items in cart</span>
            <strong class="summary-value" data-cart-count>0</strong>
          </div>
          <div class="summary-row">
            <span>Subtotal</span>
            <strong id="summary-subtotal" class="summary-value">$0.00</strong>
          </div>
          <div class="summary-row">
            <span>Service & taxes (8%)</span>
            <strong id="summary-fee" class="summary-value">$0.00</strong>
          </div>
          <div class="summary-row summary-total">
            <span>Total</span>
            <strong id="summary-total" class="summary-value">$0.00</strong>
          </div>

          <div class="summary-actions">
            <button id="proceed-order-btn" class="pill-btn pill-btn--primary" type="button">Proceed to Order</button>
            <a class="pill-btn pill-btn--ghost" href="menu.html">Back to Menu</a>
          </div>
        </aside>
      </section>

      <section class="order-history-panel" aria-label="Order history">
        <div class="order-history-panel__head">
          <h2 class="section-title">Order History</h2>
          <p class="section-subtitle">Latest orders from API when available.</p>
        </div>
        <div id="order-history-content" class="order-history-list"></div>
      </section>
    </section>
  </main>

  <script src="js/topbar.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/demo-catalog.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app-shell.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
