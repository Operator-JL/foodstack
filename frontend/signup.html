<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodStack | Sign up</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="paper-bg">
  <main class="auth-page">
    <section class="brand-panel" aria-label="FoodStack brand area">
      <img src="assets/images/logo-foodstack.png" alt="FoodStack logo" class="foodstack-logo">
    </section>

    <section class="form-panel" aria-label="Sign up form area">
      <div class="auth-card">
        <h1>sign up</h1>

        <form id="customer-signup-form" class="auth-form" novalidate>
          <label for="signup-name">Full name</label>
          <input id="signup-name" name="name" type="text" placeholder="First and last name" autocomplete="name" required>

          <label for="signup-email">Email</label>
          <input id="signup-email" name="email" type="email" placeholder="Enter your email" autocomplete="email" required>

          <label for="signup-phone">Phone number</label>
          <input id="signup-phone" name="phone" type="tel" placeholder="10-digit phone number" autocomplete="tel" required>

          <label for="signup-password">Password</label>
          <input id="signup-password" name="password" type="password" placeholder="Create a password" autocomplete="new-password" required>

          <label for="signup-confirm-password">Confirm password</label>
          <input id="signup-confirm-password" name="confirm_password" type="password" placeholder="Confirm your password" autocomplete="new-password" required>

          <button class="pill-btn pill-btn--primary auth-button" type="submit">Sign up</button>
        </form>
        <button id="auth-demo-btn" class="pill-btn pill-btn--ghost auth-button auth-button--demo" type="button">Continue in Demo Mode</button>
        <p id="auth-inline-msg" class="auth-msg" aria-live="polite"></p>

        <p class="auth-link">Already have an account? <a href="login.html" aria-label="Back to login">Back to log in</a></p>
      </div>
    </section>
  </main>

  <script src="js/runtime-config.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
