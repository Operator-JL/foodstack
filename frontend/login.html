<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodStack | Login</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="paper-bg">
  <main class="auth-page">
    <section class="brand-panel" aria-label="FoodStack brand area">
      <img src="assets/images/logo-foodstack.png" alt="FoodStack logo" class="foodstack-logo">
    </section>

    <section class="form-panel" aria-label="Login form area">
      <div class="auth-card">
        <h1>log in</h1>

        <form id="customer-login-form" class="auth-form" novalidate>
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" placeholder="Enter your email" autocomplete="email" required>

          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>

          <button class="pill-btn pill-btn--primary auth-button" type="submit">Log in</button>
        </form>
        <p id="auth-inline-msg" class="auth-msg" aria-live="polite"></p>

        <p class="auth-link">Don&apos;t have an account? <a href="signup.html" aria-label="Create account">Sign up / Create account</a></p>
        <p class="auth-staff-link">FoodStack staff? <a href="admin-login.html" aria-label="Staff sign in">Sign in here</a></p>
      </div>
    </section>
  </main>

  <script src="js/runtime-config.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
