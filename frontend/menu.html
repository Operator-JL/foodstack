<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodStack | Menu</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body class="paper-bg">
  <main class="app-shell">
    <section class="app-surface menu-layout">
      <header class="app-header">
        <a class="brand-link" href="home.html" aria-label="FoodStack home">
          <img src="assets/images/logo-foodstack.png" alt="FoodStack logo">
        </a>

        <div class="user-chip">Menu Catalog</div>

        <nav class="nav-actions" aria-label="Menu navigation">
          <a class="pill-btn pill-btn--ghost" href="home.html">Home</a>
          <a class="pill-btn pill-btn--soft" href="cart.html">Cart <span class="badge-count" data-cart-count>0</span></a>
          <a class="pill-btn pill-btn--ghost" href="login.html" data-logout>Logout</a>
        </nav>
      </header>

      <section class="menu-tools">
        <div>
          <h1 class="section-title">Choose your favorites</h1>
          <p class="section-subtitle">Use tabs to filter by category and add products to your cart.</p>
        </div>
        <a class="pill-btn pill-btn--primary" href="cart.html">Go to cart</a>
      </section>

      <section aria-label="Menu categories">
        <div id="menu-tabs" class="category-tabs"></div>
      </section>

      <section aria-label="Products grid">
        <div id="menu-grid" class="product-grid"></div>
        <p id="menu-msg" class="menu-note" aria-live="polite"></p>
      </section>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app-shell.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
