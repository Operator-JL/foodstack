<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodStack | Staff Login</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/admin-login.css">
</head>
<body class="paper-bg">
  <main class="auth-page">
    <section class="brand-panel" aria-label="FoodStack brand area">
      <img src="assets/images/logo-foodstack.png" alt="FoodStack logo" class="foodstack-logo">
    </section>

    <section class="form-panel" aria-label="Staff login area">
      <div class="auth-card">
        <h1>admin sign in</h1>

        <form id="admin-login-form" class="auth-form" novalidate>
          <label for="admin-email">Staff email</label>
          <input id="admin-email" name="email" type="email" placeholder="staff@foodstack.com" autocomplete="email" required>

          <label for="admin-password">Password</label>
          <input id="admin-password" name="password" type="password" placeholder="Enter staff password" autocomplete="current-password" required>

          <button id="admin-login-btn" class="pill-btn pill-btn--primary auth-button" type="submit">Enter dashboard</button>
        </form>

        <p id="admin-auth-msg" class="admin-auth-msg" aria-live="polite"></p>
        <p class="admin-demo-hint">Live API login: <code id="admin-demo-creds"></code></p>
        <p class="auth-link">Need customer access? <a href="login.html" aria-label="Go to customer login">Back to log in</a></p>
      </div>
    </section>
  </main>

  <script src="js/api-client.js"></script>
  <script src="js/admin-data.js"></script>
  <script src="js/admin-auth.js"></script>
</body>
</html>
