<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodStack | Staff Home</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/staff-home.css">
</head>
<body class="paper-bg">
  <main class="app-shell">
    <section class="app-surface staff-home-shell">
      <header class="app-header app-header--topbar" data-topbar data-topbar-mode="admin" data-topbar-context="staff-home"></header>

      <section class="staff-hero" aria-label="Staff operations home">
        <div>
          <h1 id="staff-hero-title">Welcome back, FoodStack Manager</h1>
          <p class="staff-hero-subtitle">Monitor store activity, track incoming orders, and jump quickly into daily admin workflows.</p>
        </div>
        <div class="staff-hero-actions">
          <a class="pill-btn pill-btn--primary" href="admin-dashboard.html">Open Dashboard</a>
          <a class="pill-btn pill-btn--soft" href="menu.html">View Menu</a>
          <a class="pill-btn pill-btn--ghost" href="admin-dashboard.html#recent-orders-panel">Manage Orders</a>
        </div>
      </section>

      <section class="staff-section" aria-label="Quick stats">
        <div class="staff-section-head">
          <h2>Quick stats</h2>
        </div>
        <div id="staff-stats-grid" class="staff-stats-grid"></div>
      </section>

      <section class="staff-columns" aria-label="Quick actions and recent activity">
        <article class="staff-panel">
          <div class="staff-panel-head">
            <h2>Quick actions</h2>
          </div>
          <div id="staff-actions-grid" class="staff-actions-grid"></div>
        </article>

        <article class="staff-panel">
          <div class="staff-panel-head">
            <h2>Recent activity</h2>
          </div>
          <ul id="staff-activity-list" class="staff-activity-list"></ul>
        </article>
      </section>

      <section class="staff-panel" aria-label="Analytics preview">
        <div class="staff-panel-head">
          <h2>Analytics preview</h2>
          <p class="staff-panel-subtitle">Orders trend this week from live API data.</p>
        </div>
        <div id="staff-analytics-chart" class="staff-analytics-chart"></div>
      </section>

      <p id="staff-home-msg" class="staff-inline-msg" aria-live="polite"></p>
    </section>
  </main>

  <script src="js/topbar.js"></script>
  <script src="js/runtime-config.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/admin-data.js"></script>
  <script src="js/staff-home.js"></script>
</body>
</html>
